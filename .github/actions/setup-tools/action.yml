name: Setup Tools
description: Setup required tools in the workspace

runs:
  using: composite
  steps:
  - name: Setup Tools
    uses: egose/actions/asdf-tools@799b388fb3497236093c6eb7e3eac0b4c8f956ce # v0.16.0
    with:
      plugins: |
        sonarscanner=https://github.com/virtualstaticvoid/asdf-sonarscanner.git
        database-tools=https://github.com/egose/asdf-database-tools.git

  - name: Install python tools
    run: |
      pip install -r requirements.txt
      asdf reshim
    shell: bash
