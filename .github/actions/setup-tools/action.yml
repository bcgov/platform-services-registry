name: Setup Tools
description: Setup required tools in the workspace

runs:
  using: composite
  steps:
  - name: Setup Tools
    uses: egose/actions/asdf-tools@ef042a54d9446c85fdd1044d342c614b5353f812 # v0.10.0
    with:
      plugins: |
        sonarscanner=https://github.com/virtualstaticvoid/asdf-sonarscanner.git
        database-tools=https://github.com/egose/asdf-database-tools.git

  - name: Install python tools
    run: |
      pip install -r requirements.txt
      asdf reshim
    shell: bash
