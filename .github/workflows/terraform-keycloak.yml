name: 52.Terraform - Keycloak

on:
  push:
    branches:
    - main
    paths:
    - terraform/keycloak/**
    - .github/workflows/terraform-keycloak.yml
  pull_request:
    paths:
    - terraform/keycloak/**
    - .github/workflows/terraform-keycloak.yml

jobs:
  terraform:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    environment:
      name: tf-keycloak
    steps:
    - uses: hmarr/debug-action@f7318c783045ac39ed9bb497e22ce835fdafbfe6
    - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

    - name: Setup Tools
      uses: ./.github/actions/setup-tools

    - name: Authenticate and set context
      uses: redhat-actions/oc-login@a04f887e9e56f1f3566ebb8c6388483c6724185e
      with:
        openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
        openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
        namespace: ${{ vars.OPENSHIFT_NAMESPACE }}
        insecure_skip_tls_verify: true

    - name: Terraform Format
      id: fmt
      run: terraform fmt -check
      working-directory: ./terraform/keycloak

    - name: Terraform Variables
      run: |
        cat >"ci.auto.tfvars" <<EOF
        dev_client_secret = "${{ secrets.DEV_CLIENT_SECRET }}"
        test_client_secret = "${{ secrets.TEST_CLIENT_SECRET }}"
        prod_client_secret = "${{ secrets.PROD_CLIENT_SECRET }}"
        EOF

      working-directory: ./terraform/keycloak

    - name: Debug Keycloak endpoint
      run: |
        terraform version
        curl -i -L https://dev.loginproxy.gov.bc.ca/auth/realms/platform-services || true
        echo "Testing Keycloak..."
        curl -v https://dev.loginproxy.gov.bc.ca/auth || true
        echo "----"
        curl -v https://dev.loginproxy.gov.bc.ca || true

    - name: Terraform Init
      id: init
      run: terraform init
      working-directory: ./terraform/keycloak

    - name: Terraform Plan
      id: plan
      if: github.event_name == 'pull_request'
      env:
        TF_LOG: TRACE
        TF_LOG_PROVIDER: TRACE
      run: terraform plan -no-color
      working-directory: ./terraform/keycloak
      continue-on-error: true

    - name: Create Comment
      uses: actions/github-script@450193c5abd4cdb17ba9f3ffcfe8f635c4bb6c2a
      if: github.event_name == 'pull_request'
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const planDetail = process.env.PLAN || "No plan output available.";

          const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
          #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
          #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`
          <details><summary>Show Plan</summary>

          \`\`\`\n${planDetail}\n\`\`\`

          </details>

          *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          });

    - name: Terraform Plan Status
      if: steps.plan.outcome == 'failure'
      run: exit 1

    - name: Terraform Apply
      if: github.event_name == 'push'
      run: terraform apply -auto-approve
      working-directory: ./terraform/keycloak
